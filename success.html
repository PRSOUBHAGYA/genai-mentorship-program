<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enrollment Successful | GenAI Mentorship Program</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-900 flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 text-center border border-slate-100">
        <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fa-solid fa-check text-4xl"></i>
        </div>
        <h1 class="text-3xl font-bold text-slate-900 mb-4">Enrollment Successful!</h1>
        <p class="text-slate-600 mb-8">Your application has been received. Welcome to the GenAI Mentorship Program! We will review your details and get back to you soon.</p>

        <button id="submit-and-home" class="inline-block w-full py-3 bg-blue-600 text-white font-semibold rounded-xl hover:bg-blue-700 transition shadow-lg shadow-blue-200 text-base">
            Return to Home
        </button>

        <div class="mt-8">
            <p class="text-lg text-slate-700 font-semibold">
                Submitting your enrollment... Redirecting in <span id="countdown" class="text-2xl font-bold text-blue-600">5</span> seconds
            </p>
        </div>
    </div>

    <script>
        // Auto-submit form and redirect after 5 seconds
        let timeLeft = 5;
        const countdownEl = document.getElementById('countdown');

        const timer = setInterval(() => {
            timeLeft--;
            if (countdownEl) countdownEl.textContent = timeLeft;
        }, 1000);

        // Auto-submit data to Formspree and redirect after 5 seconds
        setTimeout(async () => {
            clearInterval(timer);
            const data = JSON.parse(localStorage.getItem('pending_enrollment'));

            if (data) {
                try {
                    const formData = new FormData();
                    for (const key in data) {
                        formData.append(key, data[key]);
                    }
                    formData.append('payment_status', 'completed');

                    await fetch('https://formspree.io/f/xyklpdzw', {
                        method: 'POST',
                        body: formData,
                        headers: { 'Accept': 'application/json' }
                    });

                    localStorage.removeItem('pending_enrollment');
                } catch (error) {
                    console.error('Error submitting form:', error);
                }
            }

            window.location.href = 'index.html';
        }, 5000);

        // Manual button click handler (optional)
        document.getElementById('submit-and-home').addEventListener('click', async () => {
            clearInterval(timer);
            const data = JSON.parse(localStorage.getItem('pending_enrollment'));

            if (data) {
                try {
                    const formData = new FormData();
                    for (const key in data) {
                        formData.append(key, data[key]);
                    }
                    formData.append('payment_status', 'completed');

                    await fetch('https://formspree.io/f/xyklpdzw', {
                        method: 'POST',
                        body: formData,
                        headers: { 'Accept': 'application/json' }
                    });

                    localStorage.removeItem('pending_enrollment');
                } catch (error) {
                    console.error('Error submitting form:', error);
                }
            }

            window.location.href = 'index.html';
        });
    </script>

</body>
</html>
